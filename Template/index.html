<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance News Test</title>
</head>
<body>
    <h1>Finance News</h1>
    <div id="news">
        Loading news...
    </div>
    <hr>
    <h2>13. Property Value</h2>
    <form id="add-property-form">
        <input type="text" id="property-name" placeholder="Property Name" required>
        <input type="number" id="property-value" placeholder="Property Value" required>
        <button type="submit">Add Property</button>
    </form>
    <ul id="property-list"></ul>
    <script>
        async function fetchNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                if (data.status === 'ok' && data.articles && data.articles.length > 0) {
                    document.getElementById('news').innerHTML = data.articles.map(article => {
                        if (article.url) {
                            return `<div><a href="${article.url}" target="_blank" rel="noopener noreferrer"><strong>${article.title}</strong></a><br>${article.description || ''}</div><hr>`;
                        } else {
                            return `<div><strong>${article.title}</strong><br>${article.description || ''}</div><hr>`;
                        }
                    }).join('');
                } else {
                    document.getElementById('news').innerText = 'No news available.';
                }
            } catch (e) {
                document.getElementById('news').innerText = 'Error loading news.';
            }
        }
        fetchNews();

        // Property section logic
        const propertyList = [];
        function renderProperties() {
            const ul = document.getElementById('property-list');
            if (propertyList.length === 0) {
                ul.innerHTML = '<li>No properties added yet.</li>';
            } else {
                ul.innerHTML = propertyList.map(p => `<li><strong>${p.name}</strong>: ₹${p.value.toLocaleString()}</li>`).join('');
            }
        }
        document.getElementById('add-property-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('property-name').value.trim();
            const value = parseFloat(document.getElementById('property-value').value);
            if (name && !isNaN(value)) {
                propertyList.push({ name, value });
                renderProperties();
                this.reset();
            }
        });
        renderProperties();
    </script>
</body>
</html>
